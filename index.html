<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task System</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#eeeeee;
  --text:#1a1a1a;--text2:#555555;--text3:#888888;
  --border:#dddddd;--border2:#bbbbbb;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --amber-bg:#FFF3CD;--amber-text:#7B4F00;
  --red-bg:#FDECEA;--red-text:#6B1A1A;
  --success:#1A4731;--success-bg:#E8F5E9;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1a;--bg2:#252525;--bg3:#2f2f2f;
    --text:#f0f0f0;--text2:#aaaaaa;--text3:#666666;
    --border:#333333;--border2:#555555;
    --blue:#85B7EB;--blue-bg:#042C53;--blue-text:#B5D4F4;
    --amber-bg:#412402;--amber-text:#FAC775;
    --red-bg:#501313;--red-text:#F7C1C1;
    --success-bg:#173404;--success:#C0DD97;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0}
.container{max-width:680px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:22px;font-weight:500;color:var(--text);margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text3);margin-bottom:1.5rem}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{font-size:13px;padding:6px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.tab.active{background:var(--bg2);color:var(--text);border-color:var(--border2);font-weight:500}
.domain-panel{display:none}.domain-panel.active{display:block}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.25rem}
.stat{background:var(--bg2);border-radius:var(--radius);padding:.65rem .75rem;text-align:center}
.stat-n{font-size:20px;font-weight:500;color:var(--text)}
.stat-l{font-size:11px;color:var(--text3);margin-top:1px}
.burst-box{background:var(--bg2);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1.25rem}
.burst-title{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem}
.burst-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:4px}
.burst-sub{font-size:12px;color:var(--text3);margin-bottom:.75rem}
.burst-note{font-size:12px;color:var(--text2);font-style:italic;margin-bottom:.75rem;padding:6px 10px;background:var(--bg);border-left:2px solid var(--border2);border-radius:0 var(--radius) var(--radius) 0}
.burst-btn{font-size:12px;padding:5px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text2);cursor:pointer}
.burst-btn:hover{background:var(--bg)}
.legend{display:flex;gap:12px;margin-bottom:1rem;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%}
.pill{display:inline-flex;align-items:center;font-size:11px;padding:2px 7px;border-radius:var(--radius);font-weight:500;margin-left:4px}
.pill-block{background:var(--red-bg);color:var(--red-text)}
.pill-dead{background:var(--amber-bg);color:var(--amber-text)}
.pill-rep{background:var(--blue-bg);color:var(--blue-text)}
.task-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1.25rem}
.task-row{display:flex;align-items:flex-start;gap:10px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:9px 12px;transition:border-color .15s}
.task-row:hover{border-color:var(--border2)}
.task-row.done{opacity:.4}.task-row.done .task-title{text-decoration:line-through}
.task-row.is-blocker{border-left:2px solid var(--red-text);border-radius:0 var(--radius) var(--radius) 0}
.chk{width:18px;height:18px;border-radius:4px;border:0.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.task-row.done .chk{background:var(--success-bg);border-color:var(--success)}
.task-body{flex:1;min-width:0}
.task-title{font-size:14px;color:var(--text);line-height:1.4}
.task-flags{display:flex;align-items:center;gap:4px;margin-top:4px;flex-wrap:wrap}
.task-meta{font-size:12px;color:var(--text3)}
.flag-btn{font-size:11px;padding:2px 7px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;color:var(--text3);cursor:pointer}
.flag-btn:hover{border-color:var(--border2);color:var(--text)}
.flag-btn.on-block{background:var(--red-bg);color:var(--red-text);border-color:var(--red-text)}
.flag-btn.on-dead{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-text)}
.flag-btn.on-rep{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-text)}
.notes-area{width:100%;margin-top:6px;font-size:12px;padding:6px 8px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);resize:vertical;min-height:48px;font-family:inherit}
.rep-controls{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.rep-controls select,.rep-controls input[type=number]{font-size:12px;padding:3px 6px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text)}
.rep-controls input[type=number]{width:52px}
.rep-due{font-size:11px;color:var(--blue)}
.del-btn{font-size:12px;padding:2px 6px;border-radius:var(--radius);border:0.5px solid transparent;background:transparent;color:var(--text3);cursor:pointer;flex-shrink:0}
.del-btn:hover{color:var(--red-text)}
.add-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.add-row input[type=text]{flex:1;min-width:120px;font-size:13px;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text)}
.add-row select,.toolbar select{font-size:13px;padding:7px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text)}
.add-row button,.toolbar button{font-size:13px;padding:7px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text);cursor:pointer}
.add-row button:hover,.toolbar button:hover{background:var(--bg2)}
.toolbar{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.save-status{font-size:12px;color:var(--text3)}
.sync-bar{font-size:12px;padding:8px 12px;border-radius:var(--radius);margin-bottom:1.25rem;display:none}
.sync-bar.visible{display:block}
.sync-bar.ok{background:var(--success-bg);color:var(--success)}
.sync-bar.err{background:var(--red-bg);color:var(--red-text)}
</style>
</head>
<body>
<div class="container">
  <h1>Task System</h1>
  <p class="subtitle">Work &middot; Personal &middot; Projects</p>
  <div class="tabs">
    <button class="tab active" onclick="switchTab(event,'work')">Work</button>
    <button class="tab" onclick="switchTab(event,'personal')">Personal</button>
    <button class="tab" onclick="switchTab(event,'projects')">Projects</button>
  </div>
  <div class="toolbar">
    <button onclick="saveState()">Save</button>
    <button onclick="pushToTodoist()">Push to Todoist</button>
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="clearAll()">Clear all</button>
    <span class="save-status" id="save-status"></span>
  </div>
  <div class="sync-bar" id="sync-bar"></div>
  <div id="panel-work" class="domain-panel active"></div>
  <div id="panel-personal" class="domain-panel"></div>
  <div id="panel-projects" class="domain-panel"></div>
</div>

<script>
const STORAGE_KEY='paul_tasks_v5';
const TODOIST_TOKEN='f640d38f53a09bc81c0d46a159524c02ad17e9fa';
// Replace YOUR_WORKER_SUBDOMAIN with your Cloudflare Worker subdomain after deployment
const PROXY='https://todoist-proxy.paul-anthony-brown.workers.dev/todoist';
const sizeLabel={S:'Quick win',M:'One sitting',L:'Multi-step'};
const sizeDot={S:'#1D9E75',M:'#BA7517',L:'#A32D2D'};
const domainNames={work:'Work',personal:'Personal',projects:'Projects'};
const priorityMap={S:4,M:3,L:2};

function today(){return new Date().toISOString().slice(0,10)}
function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function intervalDays(t){if(t.repeatType==='daily')return 1;if(t.repeatType==='weekly')return 7;if(t.repeatType==='monthly')return 30;return Math.max(1,parseInt(t.repeatEvery)||1)}
function repeatLabel(t){if(t.repeatType==='daily')return'every day';if(t.repeatType==='weekly')return'every week';if(t.repeatType==='monthly')return'every month';return`every ${t.repeatEvery||1} days`}
function repeatDisplay(t){if(t.repeatType==='daily')return'Daily';if(t.repeatType==='weekly')return'Weekly';if(t.repeatType==='monthly')return'Monthly';return`Every ${t.repeatEvery||1}d`}

let nextId=1;
let state={work:[],personal:[],projects:[]};

function mkTask(title,size){return{id:nextId++,title,size,done:false,blocker:false,deadline:false,repeat:false,repeatType:'daily',repeatEvery:1,dueDate:today(),note:''}}
function priorityScore(t){if(t.done)return 999;const s=t.blocker&&t.deadline?0:t.blocker?1:t.deadline?2:3;return s*10+{S:0,M:1,L:2}[t.size]}
function sorted(d){return[...state[d]].sort((a,b)=>priorityScore(a)-priorityScore(b))}
function getBurst(d){return sorted(d).find(t=>!t.done)||null}

function saveState(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({state,nextId}));showStatus('Saved');}
  catch(e){showStatus('Save failed')}
}
function loadState(){
  try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;const d=JSON.parse(raw);if(d.state)state=d.state;if(d.nextId)nextId=d.nextId;}catch(e){}
}
function clearAll(){
  if(!confirm('Clear all tasks?'))return;
  state={work:[],personal:[],projects:[]};nextId=1;
  localStorage.removeItem(STORAGE_KEY);
  ['work','personal','projects'].forEach(renderPanel);showStatus('Cleared');
}
function showStatus(msg){const el=document.getElementById('save-status');el.textContent=msg;setTimeout(()=>{el.textContent=''},3000)}
function showSyncBar(msg,ok=true){
  const el=document.getElementById('sync-bar');
  el.textContent=msg;
  el.className='sync-bar visible '+(ok?'ok':'err');
  setTimeout(()=>el.classList.remove('visible'),5000);
}

async function proxyReq(method,path,body){
  const res=await fetch(PROXY+path,{
    method,
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+TODOIST_TOKEN
    },
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok)throw new Error('API error '+res.status);
  if(res.status===204)return null;
  return res.json();
}

async function pushToTodoist(){
  showStatus('Syncing...');
  try{
    const existingProjects=await proxyReq('GET','/projects');
    const projectMap={};

    for(const domain of['work','personal','projects']){
      const name=domainNames[domain];
      let proj=existingProjects.find(p=>p.name===name);
      if(!proj) proj=await proxyReq('POST','/projects',{name});
      projectMap[domain]=proj.id;
    }

    const existingTasks=await proxyReq('GET','/tasks');
    let pushed=0;

    for(const domain of['work','personal','projects']){
      const projId=projectMap[domain];
      const openTasks=state[domain].filter(t=>!t.done);

      for(const t of openTasks){
        const flags=[t.blocker?'blocker':'',t.deadline?'deadline':''].filter(Boolean).join(', ');
        const desc=[sizeLabel[t.size],flags?'Flags: '+flags:'',t.note?'Next: '+t.note:''].filter(Boolean).join(' | ');
        const p=t.blocker&&t.deadline?1:t.blocker||t.deadline?2:priorityMap[t.size];
        const existing=existingTasks.find(et=>et.project_id===projId&&et.content===t.title);

        if(existing){
          await proxyReq('POST',`/tasks/${existing.id}`,{
            description:desc,priority:p,
            ...(t.repeat?{due_string:repeatLabel(t)}:{})
          });
        } else {
          await proxyReq('POST','/tasks',{
            content:t.title,project_id:projId,
            description:desc,priority:p,
            ...(t.repeat?{due_string:repeatLabel(t)}:{})
          });
        }
        pushed++;
      }
    }

    showSyncBar(`Pushed ${pushed} task${pushed!==1?'s':''} to Todoist.`,true);
    showStatus('Synced');
  } catch(e){
    showStatus('Sync failed');
    showSyncBar('Sync failed: '+e.message,false);
  }
}

function exportCSV(){
  const rows=['TYPE,CONTENT,DESCRIPTION,PRIORITY,INDENT'];
  Object.keys(state).forEach(domain=>{
    rows.push(`project,${domainNames[domain]},,,`);
    sorted(state[domain]).forEach(t=>{
      const flags=[t.blocker?'blocker':'',t.deadline?'deadline':'',t.repeat?repeatDisplay(t):''].filter(Boolean).join(' | ');
      const desc=[sizeLabel[t.size],flags,t.note].filter(Boolean).join(' | ').replace(/,/g,';');
      rows.push(`task,"${t.title.replace(/"/g,'""')}","${desc}",${priorityMap[t.size]},1`);
    });
  });
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tasks.csv';a.click();
  showStatus('CSV exported');
}

function toggleDone(id,domain){
  const t=state[domain].find(x=>x.id===id);if(!t)return;
  if(t.repeat&&!t.done){t.dueDate=addDays(today(),intervalDays(t));}else{t.done=!t.done;}
  saveState();renderPanel(domain);
}
function toggleFlag(id,domain,flag){const t=state[domain].find(x=>x.id===id);if(t)t[flag]=!t[flag];saveState();renderPanel(domain)}
function setRepeatType(id,domain,val){const t=state[domain].find(x=>x.id===id);if(t)t.repeatType=val;saveState();renderPanel(domain)}
function setRepeatEvery(id,domain,val){const t=state[domain].find(x=>x.id===id);if(t)t.repeatEvery=Math.max(1,parseInt(val)||1);saveState();renderPanel(domain)}
function deleteTask(id,domain){state[domain]=state[domain].filter(x=>x.id!==id);saveState();renderPanel(domain)}
function updateNote(id,domain,val){const t=state[domain].find(x=>x.id===id);if(t)t.note=val;saveState()}
function addTask(domain){
  const inp=document.getElementById('ni-'+domain);const sel=document.getElementById('ns-'+domain);
  const title=inp.value.trim();if(!title)return;
  state[domain].push(mkTask(title,sel.value));inp.value='';saveState();renderPanel(domain);
}

function renderStats(d){
  const all=state[d];
  const open=all.filter(t=>!t.done).length,done=all.filter(t=>t.done).length,bl=all.filter(t=>t.blocker&&!t.done).length,rep=all.filter(t=>t.repeat).length;
  return`<div class="stats"><div class="stat"><div class="stat-n">${open}</div><div class="stat-l">Open</div></div><div class="stat"><div class="stat-n">${done}</div><div class="stat-l">Done</div></div><div class="stat"><div class="stat-n">${bl}</div><div class="stat-l">Blockers</div></div><div class="stat"><div class="stat-n">${rep}</div><div class="stat-l">Repeating</div></div></div>`;
}

function renderBurst(domain){
  const pick=getBurst(domain);
  if(!pick)return`<div class="burst-box"><div class="burst-title">Start here</div><div class="burst-name" style="font-weight:400;color:var(--text2)">All clear.</div></div>`;
  const flags=[pick.blocker?`<span class="pill pill-block">blocker</span>`:'',pick.deadline?`<span class="pill pill-dead">deadline</span>`:'',pick.repeat?`<span class="pill pill-rep">${repeatDisplay(pick)}</span>`:''].join('');
  const noteHtml=pick.note?`<div class="burst-note">Next: ${pick.note}</div>`:'';
  const action=pick.repeat?'Reschedule and get next':'Mark done and get next';
  return`<div class="burst-box"><div class="burst-title">Start here</div><div class="burst-name">${pick.title}${flags}</div><div class="burst-sub">${sizeLabel[pick.size]}${pick.repeat?' &mdash; next: '+pick.dueDate:''}</div>${noteHtml}<button class="burst-btn" onclick="toggleDone(${pick.id},'${domain}')">${action} &rarr;</button></div>`;
}

function renderList(domain){
  return sorted(domain).map(t=>{
    const flags=[t.blocker?`<span class="pill pill-block">blocker</span>`:'',t.deadline?`<span class="pill pill-dead">deadline</span>`:'',t.repeat?`<span class="pill pill-rep">${repeatDisplay(t)}</span>`:''].join('');
    const rc=t.repeat?`<div class="rep-controls"><select onchange="setRepeatType(${t.id},'${domain}',this.value)"><option value="daily"${t.repeatType==='daily'?' selected':''}>Daily</option><option value="custom"${t.repeatType==='custom'?' selected':''}>Every X days</option><option value="weekly"${t.repeatType==='weekly'?' selected':''}>Weekly</option><option value="monthly"${t.repeatType==='monthly'?' selected':''}>Monthly</option></select>${t.repeatType==='custom'?`<input type="number" min="1" value="${t.repeatEvery}" onchange="setRepeatEvery(${t.id},'${domain}',this.value)"><span style="font-size:12px;color:var(--text3)">days</span>`:''}<span class="rep-due">next: ${t.dueDate}</span></div>`:'';
    return`<div class="task-row${t.done?' done':''}${t.blocker&&!t.done?' is-blocker':''}">
      <div class="chk" onclick="toggleDone(${t.id},'${domain}')">${t.done?'<i class="ti ti-check" style="font-size:12px;color:var(--success)"></i>':''}</div>
      <div class="task-body">
        <div class="task-title">${t.title}${flags}</div>
        <div class="task-flags">
          <span class="task-meta"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${sizeDot[t.size]};margin-right:4px"></span>${sizeLabel[t.size]}</span>
          <button class="flag-btn${t.blocker?' on-block':''}" onclick="toggleFlag(${t.id},'${domain}','blocker')">blocker</button>
          <button class="flag-btn${t.deadline?' on-dead':''}" onclick="toggleFlag(${t.id},'${domain}','deadline')">deadline</button>
          <button class="flag-btn${t.repeat?' on-rep':''}" onclick="toggleFlag(${t.id},'${domain}','repeat')">repeat</button>
        </div>
        ${rc}
        <textarea class="notes-area" placeholder="Handoff note — what is the next action?" onchange="updateNote(${t.id},'${domain}',this.value)">${t.note||''}</textarea>
      </div>
      <button class="del-btn" onclick="deleteTask(${t.id},'${domain}')"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');
}

function renderAddRow(domain){
  return`<div class="add-row"><input type="text" id="ni-${domain}" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask('${domain}')"><select id="ns-${domain}"><option value="S">Quick</option><option value="M" selected>One sitting</option><option value="L">Multi-step</option></select><button onclick="addTask('${domain}')">Add</button></div>`;
}

function renderLegend(){
  return`<div class="legend"><div class="leg"><span class="dot" style="background:#1D9E75"></span>Quick win</div><div class="leg"><span class="dot" style="background:#BA7517"></span>One sitting</div><div class="leg"><span class="dot" style="background:#A32D2D"></span>Multi-step</div><div class="leg"><span class="pill pill-block" style="margin:0">blocker</span></div><div class="leg"><span class="pill pill-dead" style="margin:0">deadline</span></div><div class="leg"><span class="pill pill-rep" style="margin:0">repeat</span></div></div>`;
}

function renderPanel(domain){
  document.getElementById('panel-'+domain).innerHTML=renderStats(domain)+renderBurst(domain)+renderLegend()+'<div class="task-list">'+renderList(domain)+'</div>'+renderAddRow(domain);
}

function switchTab(e,domain){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.domain-panel').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('panel-'+domain).classList.add('active');
  renderPanel(domain);
}

loadState();
['work','personal','projects'].forEach(renderPanel);
</script>
</body>
</html>
